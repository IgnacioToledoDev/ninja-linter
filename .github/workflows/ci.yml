name: CI / Release

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --verbose

  clippy:
    name: Clippy
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy -- -D warnings

  bump-version:
    name: Bump Version
    needs: [clippy]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Update Cargo.toml
        run: sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml

      - uses: dtolnay/rust-toolchain@stable

      - name: Update Cargo.lock
        run: cargo update -p ninja-linter

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git diff --cached --quiet || git commit -m "chore: bump version to $VERSION"
          git push origin main

  build:
    name: Build (${{ matrix.target }})
    needs: [bump-version]
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: ninja-linter
          - os: macos-latest
            target: x86_64-apple-darwin
            bin: ninja-linter
          - os: macos-latest
            target: aarch64-apple-darwin
            bin: ninja-linter
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: ninja-linter.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --profile dist --target ${{ matrix.target }}
      - name: Package (Linux / macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/dist/${{ matrix.bin }} ninja-linter
          tar -czf dist/ninja-linter-${{ matrix.target }}.tar.gz ninja-linter
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target/${{ matrix.target }}/dist/${{ matrix.bin }} ninja-linter.exe
          Compress-Archive -Path ninja-linter.exe -DestinationPath dist/ninja-linter-${{ matrix.target }}.zip
      - uses: actions/upload-artifact@v4
        with:
          name: ninja-linter-${{ matrix.target }}
          path: dist/*

  release:
    name: Release
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
